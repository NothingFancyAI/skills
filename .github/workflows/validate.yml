name: validate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3

      - name: Validate plugin metadata
        run: uv run .github/scripts/validate_plugin_metadata.py

      - name: Validate skill frontmatter
        run: uv run .github/scripts/validate_skill_frontmatter.py

      - name: Validate Codex sidecar
        run: uv run .github/scripts/validate_codex_skills.py

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        with:
          args: check
